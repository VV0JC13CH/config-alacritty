[bell]
animation = "EaseOutExpo"
duration = 75

[cursor]
style = "Block"
unfocused_hollow = true

[font]
size = 12.0

[font.bold]
family = "JetBrainsMonoNerdFont"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMonoNerdFont"
style = "Italic"

[font.normal]
family = "JetBrainsMonoNerdFont"
style = "Regular"

[font.offset]
x = 0
y = 0

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToTop"
key = "Home"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "End"
mode = "~Alt"
mods = "Shift"

[general]
live_config_reload = true
import = ["/home/wbobrowski/.config/alacritty/themes/themes/tokyo-night.yaml"]

[terminal]

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
history = 0

[selection]
save_to_clipboard = true
semantic_escape_chars = """,│`|:"' ()[]{}<>"""

[terminal.shell]
args = ["-l", "-c", "set -l latest (zellij list-sessions | tail -n 1 | awk '{print $1}'); zellij attach $latest; or zellij"]
program = "/usr/bin/fish"

[window]
decorations = "full"
dynamic_title = true
startup_mode = "Maximized"

[window.dimensions]
columns = 80
lines = 24

[window.padding]
x = 2
y = 2

[colors]
draw_bold_text_with_bright_colors = true

